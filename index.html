<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Interactive rating component</title>

</head>
<body>
<article class="ratingwindow">
  <!-- Rating state start -->

  <h2>How did we do?</h2>

  <p>Please let us know how we did with your support request. All feedback is appreciated 
  to help us improve our offering!</p>
  <div class="ratingbuttons">
    <button class="ratingbutton" value="1" type="button">1</button>
    <button class="ratingbutton" value="2" type="button">2</button>
    <button class="ratingbutton" value="3" type="button">3</button>
    <button class="ratingbutton" value="4" type="button">4</button>
    <button class="ratingbutton" value="5" type="button">5</button>
  </div>

  <button class="submitButton" type="submit" onclick="submitRating()">Submit</button>

  <!-- Rating state end -->
</article>

<article class="thank-you-state hidden">
    <!-- Thank you state start -->
    <div class="thank-you-message">
  You selected <span class="selected-rating"></span> out of 5
  </div>

  <h2>Thank you!</h2>

  <p>We appreciate you taking the time to give a rating. If you ever need more support, 
  don’t hesitate to get in touch!</p>
   <!-- Thank you state end -->
</article>
 
</body>
</html>
